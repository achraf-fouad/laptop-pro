---
deployment:
  tasks:
    - export DEPLOYPATH=/home/maronqrc/public_html
    - /bin/cp -Rf dist/assets $DEPLOYPATH/assets
    - /bin/cp -f dist/index.html $DEPLOYPATH/index.html
    - /bin/cp -f dist/robots.txt $DEPLOYPATH/robots.txt
    - /bin/cp -f dist/sitemap.xml $DEPLOYPATH/sitemap.xml 2>/dev/null || true
    - /bin/cp -Rf dist/images $DEPLOYPATH/images 2>/dev/null || true
    - /bin/cp -Rf dist/favicon.svg $DEPLOYPATH/favicon.svg 2>/dev/null || true
    - /bin/cp -Rf dist/favicon.ico $DEPLOYPATH/favicon.ico 2>/dev/null || true
    - export BACKENDPATH=/home/maronqrc/backend
    - /bin/mkdir -p $BACKENDPATH
    - /bin/cp -Rf backend/app $BACKENDPATH/
    - /bin/cp -Rf backend/routes $BACKENDPATH/
    - /bin/cp -Rf backend/config $BACKENDPATH/
    - /bin/cp -Rf backend/database $BACKENDPATH/
    - /bin/cp -Rf backend/resources $BACKENDPATH/
